name: mcp-workbench

services:
  mcp-server:
    build:
      context: .
      dockerfile: apps/mcp-server/Dockerfile
    ports:
      - "${MCP_PORT:-8100}:8099"
      - "${API_PORT:-8110}:8110"
      - "${DASHBOARD_PORT:-1315}:1313"
    environment:
      MCP_TRANSPORT: sse
      MCP_PORT: 8099
      MCP_NAME: ${MCP_NAME:-mcp-workbench}
      MCP_VERSION: ${MCP_VERSION:-1.0.0}
      API_PORT: 8110
      DASHBOARD_PORT: ${DASHBOARD_PORT:-1313}
      DASHBOARD_SITE_DIR: /hugo-book-site
    volumes:
      - ./workflows:/app/workflows
      - ./prompts:/app/prompts
      - ./context:/app/context
      - ./runs:/app/runs
      - ./artifacts:/app/artifacts
      - ./docs:/app/docs
      - ./apps/hugo-book-site/content:/app/hugo-content
      - ./apps/hugo-book-site:/hugo-book-site
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8099/sse"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # mcp-inspector:
  #   image: ghcr.io/modelcontextprotocol/inspector:latest
  #   profiles:
  #     - debug
  #   depends_on:
  #     mcp-server:
  #       condition: service_healthy
  #   ports:
  #     - "127.0.0.1:${MCP_INSPECTOR_CLIENT_PORT:-6274}:6274"
  #     - "127.0.0.1:${MCP_INSPECTOR_PROXY_PORT:-6277}:6277"
  #   environment:
  #     HOST: 0.0.0.0
  #     MCP_AUTO_OPEN_ENABLED: "false"
  #     DANGEROUSLY_OMIT_AUTH: ${MCP_INSPECTOR_OMIT_AUTH:-true}
  #   restart: unless-stopped

  hugo-book-site:
    build:
      context: apps/hugo-book-site
      dockerfile: Dockerfile
      target: dev
    ports:
      - "${HUGO_BOOK_PORT:-1314}:1313"
    volumes:
      - ./apps/hugo-book-site:/src
      - /src/public
      - /src/resources
      - ./prompts:/src/content/docs/prompts/source:ro
      - ./workflows:/src/content/docs/workflows/source:ro
      - ./context:/src/content/docs/context/source:ro
      - ./artifacts:/src/content/docs/artifacts/source:ro
    restart: unless-stopped



volumes:
  artifacts:
  filebrowser-data:

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${MCP_PORT:-8100}:8099"
      - "${API_PORT:-8110}:8110"
      - "${HUGO_PORT:-1313}:1313"
    environment:
      MCP_TRANSPORT: sse
      MCP_PORT: 8099
      MCP_NAME: ${MCP_NAME:-mcp-workbench}
      MCP_VERSION: ${MCP_VERSION:-1.0.0}
      API_PORT: 8110
      DOCS_ROOT: /hugo-src/content/docs
      PROJECTS_ROOT: /hugo-src/content/docs/projects
    volumes:
      # Data dirs — edit live, Go và Hugo đọc qua DOCS_ROOT / PROJECTS_ROOT
      - ./workflows:/hugo-src/content/docs/workflows
      - ./prompts:/hugo-src/content/docs/prompts/source
      - ./projects:/hugo-src/content/docs/projects
    restart: unless-stopped
